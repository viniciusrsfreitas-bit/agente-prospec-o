name: Esteira Diaria de Prospeccao Foco Fiscal

on:
  schedule:
    # Configurado para rodar de segunda a sexta-feira às 11:00 UTC (08:00 no Horário de Brasília)
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # Permite que você clique em um botão no GitHub para testar o robô na hora se quiser

jobs:
  executar-esteira:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias necessarias
        run: |
          python -m pip install --upgrade pip
          pip install pandas google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client openai requests python-dotenv

      - name: Rodar a Esteira Multi-Agentes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CUSTOM_SEARCH_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SPREADSHEET_ID_CRONOGRAMA: ${{ secrets.SPREADSHEET_ID_CRONOGRAMA }}
        run: python main.py